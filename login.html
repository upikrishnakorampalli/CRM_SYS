<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise CRM Login</title>
    <script>
function login() {

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if (username === "" || password === "") {
        alert("Please enter Username and Password");
        return;
    }

    if (username === "admin" && password === "admin123") {
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid Username or Password");
    }
}
</script>

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#eef4ff;

}

.container{

    width:1000px;

    height:600px;

    display:flex;

    border-radius:20px;

    overflow:hidden;

    box-shadow:0 15px 40px rgba(0,0,0,.15);

    background:white;

}

/* Left Section */

.left{

    width:50%;

    background:linear-gradient(135deg,#2563eb,#1e3a8a);

    color:white;

    padding:60px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

}

.left h1{

    font-size:42px;

    margin-bottom:20px;

}

.left p{

    line-height:30px;

    font-size:18px;

    margin-bottom:40px;

}

.left img{

    width:220px;

}

/* Right Section */

.right{

    width:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#fff;

}

.login-box{

    width:380px;

}

.login-box h2{

    font-size:35px;

    color:#1e3a8a;

    margin-bottom:10px;

}

.login-box p{

    color:gray;

    margin-bottom:35px;

}

.input-box{

    display:flex;

    align-items:center;

    border:1px solid #ccc;

    border-radius:10px;

    margin-bottom:20px;

    padding:14px;

}

.input-box i{

    color:#2563eb;

    margin-right:12px;

}

.input-box input{

    width:100%;

    border:none;

    outline:none;

    font-size:16px;

}

.options{

    display:flex;

    justify-content:space-between;

    margin-bottom:25px;

    font-size:14px;

}

.options a{

    text-decoration:none;

    color:#2563eb;

}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#2563eb;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#1d4ed8;

}

.bottom{

    margin-top:25px;

    text-align:center;

}

.bottom a{

    text-decoration:none;

    color:#2563eb;

    font-weight:bold;

}

/* Responsive */

@media(max-width:900px){

.container{

    width:90%;

    height:auto;

    flex-direction:column;

}

.left{

    width:100%;

    padding:40px;

}

.right{

    width:100%;

    padding:40px;

}

.login-box{

    width:100%;

}

.left img{

    width:180px;

}

}
    </style>
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">

        <h1>Enterprise CRM</h1>

        <p>
            Manage Leads, Customers, Sales Pipeline and Business
            Performance with one powerful CRM solution.
        </p>

        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
        alt="CRM">

    </div>

    <!-- Right Side -->

    <div class="right">

        <div class="login-box">

            <h2>Welcome Back</h2>

            <p>Login to your CRM Account</p>

            <form onsubmit="login(); return false;">

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                   <input
type="text"
id="username"
placeholder="Username"
required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
type="password"
id="password"
placeholder="Password"
required>

                </div>

                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit">
    Login
</button>

            </form>

            <div class="bottom">

                Don't have an account?

                <a href="#">Register</a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
